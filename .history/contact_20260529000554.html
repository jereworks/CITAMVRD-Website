<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | CITAM Valley Road</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-group { margin-bottom: 25px; }
        .form-control { width: 100%; padding: 15px 20px; border: 1px solid #ddd; font-family: var(--font-sans); font-size: 0.9rem; outline: none; transition: var(--transition-smooth); background: #fafafa; }
        .form-control:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 5px 15px rgba(193, 18, 31, 0.05); }
        textarea.form-control { resize: vertical; min-height: 150px; }
        .contact-info-box { padding: 40px; background: var(--dark); color: var(--white); height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .contact-info-box h3 { color: var(--white); margin-bottom: 25px; }
        .contact-detail { display: flex; gap: 15px; margin-bottom: 20px; font-size: 0.95rem; color: #aaa; }
        .contact-detail i { color: var(--primary); font-size: 1.2rem; margin-top: 4px; }
    </style>
</head>
<body>
    <header class="about-hero-banner" style="padding-top: 180px; background-image: linear-gradient(rgba(17, 17, 17, 0.85), rgba(17, 17, 17, 0.85)), url('https://images.unsplash.com/photo-1544427920-c49ccf08c146?auto=format&fit=crop&w=1920&q=80');">
        <div class="container text-center">
            <span class="hero-pre-tag animate-on-scroll slide-up">Reach Out</span>
            <h1 class="animate-on-scroll slide-up delay-1">Get In Touch</h1>
        </div>
    </header>

    <section class="section bg-white">
        <div class="container grid-2">
            <div class="animate-on-scroll reveal-left">
                <span class="section-subtitle">Send a Message</span>
                <h2 class="section-title">How Can We Serve You?</h2>
                <form action="#" method="POST" class="mt-4">
                    <div class="grid-2" style="gap: 20px; margin-bottom: 0;">
                        <div class="form-group"><input type="text" class="form-control" placeholder="Full Name" required></div>
                        <div class="form-group"><input type="email" class="form-control" placeholder="Email Address" required></div>
                    </div>
                    <div class="form-group">
                        <select class="form-control">
                            <option>General Inquiry</option>
                            <option>Prayer Request</option>
                            <option>Join a Safari Group</option>
                            <option>Pastoral Counseling</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea class="form-control" placeholder="Your Message..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>

            <div class="animate-on-scroll reveal-right">
                <div class="contact-info-box shadow-elegant">
                    <h3>Central Office Details</h3>
                    <div class="contact-detail">
                        <i class="fas fa-map-marker-alt"></i>
                        <div><strong>Location</strong><br> 28 Valley Road, Nairobi, Kenya</div>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-phone-alt"></i>
                        <div><strong>Phone</strong><br> +254 709 861 150</div>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-envelope"></i>
                        <div><strong>Email</strong><br> valleyroad@citam.org</div>
                    </div>
                    <div class="contact-detail">
                        <i class="fas fa-clock"></i>
                        <div><strong>Office Hours</strong><br> Mon - Fri: 8:00 AM - 5:00 PM</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    </body>
</html>
